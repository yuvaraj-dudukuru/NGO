<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="header">
        <h1>Student Dashboard</h1>
        <p>Total Students: <span id="count">0</span></p>
    </header>

    <main class="container">
        <!-- Form to add a student -->
        <section class="form-section">
            <h2>Add Student</h2>
            <form id="studentForm">
                <input type="text" id="nameInput" placeholder="Student name" required>
                <input type="text" id="courseInput" placeholder="Course" required>
                <button type="submit">Add Student</button>
            </form>
            <p id="formMessage" class="message"></p>
        </section>

        <!-- The list of students (built dynamically) -->
        <section class="list-section">
            <h2>Students</h2>
            <div id="studentList" class="student-list">
                <!-- Student cards are inserted here by JavaScript -->
            </div>
        </section>
    </main>

    <footer class="footer">
        <p>&copy; 2026 Day 5 Project</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
