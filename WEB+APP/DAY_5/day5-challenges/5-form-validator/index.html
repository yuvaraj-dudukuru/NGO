<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5. Form Validator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Form Validator</h1>

    <form id="signupForm">
        <input type="text" id="nameField" placeholder="Name">
        <input type="email" id="emailField" placeholder="Email">
        <input type="password" id="passwordField" placeholder="Password">
        <button type="submit">Submit</button>
    </form>

    <p id="formMessage" class="message"></p>

    <p><a href="../index.html">&larr; Back to challenges</a></p>

    <script src="script.js"></script>
</body>
</html>
