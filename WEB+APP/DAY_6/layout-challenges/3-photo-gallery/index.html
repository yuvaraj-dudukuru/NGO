<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Responsive photo gallery with Grid and object-fit.">
    <title>Photo Gallery</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="gallery-header">
        <h1>Travel Snapshots</h1>
        <p>A responsive Grid gallery using <code>object-fit: cover</code>.</p>
    </header>

    <main class="gallery">
        <figure class="item"><img src="https://picsum.photos/id/1015/600/400" alt="Mountain river"><figcaption>Mountain River</figcaption></figure>
        <figure class="item"><img src="https://picsum.photos/id/1018/500/700" alt="Lake and hills"><figcaption>Calm Lake</figcaption></figure>
        <figure class="item"><img src="https://picsum.photos/id/1036/600/400" alt="Forest path"><figcaption>Forest Path</figcaption></figure>
        <figure class="item"><img src="https://picsum.photos/id/1039/800/500" alt="Waterfall"><figcaption>Hidden Falls</figcaption></figure>
        <figure class="item"><img src="https://picsum.photos/id/1043/600/600" alt="City building"><figcaption>Urban Lines</figcaption></figure>
        <figure class="item"><img src="https://picsum.photos/id/1050/600/400" alt="Snowy peaks"><figcaption>Winter Peaks</figcaption></figure>
        <figure class="item"><img src="https://picsum.photos/id/1057/700/400" alt="Coastline"><figcaption>Coastline</figcaption></figure>
        <figure class="item"><img src="https://picsum.photos/id/1062/600/800" alt="Beach"><figcaption>Golden Beach</figcaption></figure>
        <figure class="item"><img src="https://picsum.photos/id/1069/600/400" alt="Night street"><figcaption>City Nights</figcaption></figure>
    </main>

    <footer class="footer">
        <p>&copy; 2026 Travel Snapshots. Photos via picsum.photos.</p>
    </footer>
</body>
</html>
