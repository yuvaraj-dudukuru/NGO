<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A responsive image gallery.">
    <title>Pixel Gallery</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- HEADER -->
    <header class="gallery-header">
        <h1>Pixel Gallery</h1>
        <p>A responsive collection that adapts to phone, tablet, and desktop.</p>
    </header>

    <!-- GALLERY GRID -->
    <main class="gallery">
        <figure class="gallery-item">
            <img src="https://picsum.photos/id/1015/600/400" alt="River between mountains">
            <figcaption>Mountain River</figcaption>
        </figure>
        <figure class="gallery-item">
            <img src="https://picsum.photos/id/1016/600/400" alt="Canyon landscape">
            <figcaption>Desert Canyon</figcaption>
        </figure>
        <figure class="gallery-item">
            <img src="https://picsum.photos/id/1018/600/400" alt="Mountains and lake">
            <figcaption>Calm Lake</figcaption>
        </figure>
        <figure class="gallery-item">
            <img src="https://picsum.photos/id/1024/600/400" alt="Bear in the wild">
            <figcaption>Into the Wild</figcaption>
        </figure>
        <figure class="gallery-item">
            <img src="https://picsum.photos/id/1036/600/400" alt="Forest path">
            <figcaption>Forest Path</figcaption>
        </figure>
        <figure class="gallery-item">
            <img src="https://picsum.photos/id/1039/600/400" alt="Waterfall">
            <figcaption>Hidden Falls</figcaption>
        </figure>
        <figure class="gallery-item">
            <img src="https://picsum.photos/id/1043/600/400" alt="City building">
            <figcaption>Urban Lines</figcaption>
        </figure>
        <figure class="gallery-item">
            <img src="https://picsum.photos/id/1050/600/400" alt="Snowy mountains">
            <figcaption>Winter Peaks</figcaption>
        </figure>
    </main>

    <!-- FOOTER -->
    <footer class="footer">
        <p>&copy; 2026 Pixel Gallery. Photos via picsum.photos.</p>
    </footer>
</body>
</html>
